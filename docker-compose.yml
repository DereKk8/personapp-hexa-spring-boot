services:
  mariadb:
    image: mariadb:10.8
    container_name: persona-mariadb
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: persona_db
      MARIADB_USER: persona_db
      MARIADB_PASSWORD: persona_db
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./scripts/ddl.sql:/docker-entrypoint-initdb.d/01-ddl.sql
      - ./scripts/dml.sql:/docker-entrypoint-initdb.d/02-dml.sql

  mongodb:
    image: mongo:6.0
    container_name: persona-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin
      MONGO_INITDB_DATABASE: persona_db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  app:
    build: .
    container_name: personapp-rest
    restart: on-failure
    depends_on:
      - mariadb
      - mongodb
    ports:
      - "3000:3000"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mariadb://mariadb:3306/persona_db
      SPRING_DATA_MONGODB_HOST: mongodb

volumes:
  mariadb_data:
  mongodb_data:
