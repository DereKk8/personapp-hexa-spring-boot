version: "3.8"

services:
  mariadb:
    image: mariadb:10.8
    container_name: persona-mariadb
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: persona_db
      MARIADB_USER: persona_db
      MARIADB_PASSWORD: persona_db
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./scripts/ddl.sql:/docker-entrypoint-initdb.d/01-ddl.sql
      - ./scripts/dml.sql:/docker-entrypoint-initdb.d/02-dml.sql

  mongodb:
    image: mongo:6.0
    container_name: persona-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin
      MONGO_INITDB_DATABASE: persona_db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

volumes:
  mariadb_data:
  mongodb_data:
